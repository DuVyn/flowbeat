# ============================================================================
# FlowBeat Two-Tower 训练配置 — 云端环境
# ============================================================================
# 用法: uv run python train_two_tower.py --config configs/two_tower/config_cloud.yaml
# ============================================================================

environment: cloud
seed: 20260428

# ---------- I/O 路径（对象存储 URI） ----------
paths:
  user_features_csv:      "cos://flowbeat-ml-datasets/two_tower/user_features.csv"
  item_features_csv:      "cos://flowbeat-ml-datasets/two_tower/item_features.csv"
  train_interactions_csv: "cos://flowbeat-ml-datasets/two_tower/train_interactions.csv"
  test_interactions_csv:  "cos://flowbeat-ml-datasets/two_tower/test_interactions.csv"
  checkpoint_dir: "cos://flowbeat-ml-artifacts/two_tower/checkpoints"
  embedding_dir:  "cos://flowbeat-ml-artifacts/two_tower/embeddings"
  report_dir:     "cos://flowbeat-ml-artifacts/two_tower/reports"

# ---------- 模型超参数 ----------
model_params:
  embedding_dim: 128
  hidden_units: [256, 128]
  dropout: 0.1

# ---------- 训练超参数 ----------
train_params:
  batch_size: 1024
  learning_rate: 0.0005
  weight_decay: 1.0e-5
  epochs: 20
  device: "auto"
  num_workers: 8
  pin_memory: true
  log_every_steps: 500
  early_stopping_patience: 5
  resume: false
  resume_from: "last"

# ---------- 云端 SDK ----------
cloud:
  provider: "cos"
  region: "ap-guangzhou"
  secret_id_env: "COS_SECRET_ID"
  secret_key_env: "COS_SECRET_KEY"
