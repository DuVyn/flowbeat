# ============================================================================
# FlowBeat Two-Tower 双塔模型训练配置
# ============================================================================
# 用法:
#   本地:  uv run python train_two_tower.py --config configs/two_tower/config.yaml
#   云端:  uv run python train_two_tower.py --config configs/two_tower/config.yaml --env cloud
# ============================================================================

# ---------- 运行环境 ----------
# 可选: local | cloud
# 命令行 --env 参数可覆盖此值
environment: local

# ---------- 随机种子 ----------
seed: 20260428

# ---------- 路径配置 ----------
# 根据 environment 自动切换；local 使用相对路径，cloud 使用对象存储 URI
paths:
  local:
    # 输入：由 scripts/global/export_two_tower_dataset.py 导出的数据集
    user_features_csv:  "data/for_two_power/user_features.csv"
    item_features_csv:  "data/for_two_power/item_features.csv"
    train_interactions_csv: "data/for_two_power/train_interactions.csv"
    test_interactions_csv:  "data/for_two_power/test_interactions.csv"

    # 输出
    artifacts_dir: "recsys/artifacts/two_tower_v2"
    checkpoint_dir: "recsys/artifacts/two_tower_v2/checkpoints"
    embedding_dir:  "recsys/artifacts/two_tower_v2/embeddings"
    report_dir:     "recsys/artifacts/two_tower_v2/reports"

  cloud:
    # 输入：对象存储路径（以 Tencent COS 为例，可按需替换为 s3:// 等）
    user_features_csv:  "cos://flowbeat-ml-datasets/two_tower/user_features.csv"
    item_features_csv:  "cos://flowbeat-ml-datasets/two_tower/item_features.csv"
    train_interactions_csv: "cos://flowbeat-ml-datasets/two_tower/train_interactions.csv"
    test_interactions_csv:  "cos://flowbeat-ml-datasets/two_tower/test_interactions.csv"

    # 输出
    artifacts_dir: "cos://flowbeat-ml-artifacts/two_tower_v2"
    checkpoint_dir: "cos://flowbeat-ml-artifacts/two_tower_v2/checkpoints"
    embedding_dir:  "cos://flowbeat-ml-artifacts/two_tower_v2/embeddings"
    report_dir:     "cos://flowbeat-ml-artifacts/two_tower_v2/reports"

# ---------- 模型超参数 ----------
model_params:
  embedding_dim: 64
  hidden_units: [128, 64]
  dropout: 0.1

# ---------- 训练超参数 ----------
train_params:
  batch_size: 512
  learning_rate: 0.001
  weight_decay: 1.0e-5
  epochs: 10
  device: "auto"               # auto | cuda | mps | cpu
  num_workers: 2
  pin_memory: true
  log_every_steps: 200
  # 早停策略（设为 0 则禁用）
  early_stopping_patience: 3
  # 断点续训
  resume: false
  resume_from: "last"          # last | best | <path>

# ---------- 云端 SDK 配置（仅 environment=cloud 时生效） ----------
cloud:
  provider: "cos"              # cos | s3 | gcs
  region: "ap-guangzhou"
  secret_id_env: "COS_SECRET_ID"
  secret_key_env: "COS_SECRET_KEY"
