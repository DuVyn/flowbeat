services:
  mysql:
    image: mysql:8.0
    container_name: flowbeat-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - flowbeat-network

  minio:
    image: minio/minio:latest
    container_name: flowbeat-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - flowbeat-network

  redis:
    image: redis:8-alpine
    container_name: flowbeat-redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - flowbeat-network

networks:
  flowbeat-network:
    driver: bridge

volumes:
  mysql-data:
  minio-data:
  redis-data:
